<!DOCTYPE html>
<html lang="ko">
<head>
<meta property="og:type" content="website">
<meta property="og:title" content="💌 선물 같은 편지가 도착했어요">
<meta property="og:description" content="지금 봉투를 열어보세요">
<meta property="og:image" content="https://sese7414.github.io/gift-letter/thumbnail.png">
<meta property="og:url" content="https://sese7414.github.io/gift-letter/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>선물 같은 편지</title>

<style>
body {
  margin: 0;
  font-family: 'Pretendard', sans-serif;
  background: #f7efe5;
  display: flex;
  justify-content: center;
  align-items: center;
  /* 삭제!
  height: 100vh;
  overflow: hidden; */

  /* ✅ 추가 */
  min-height: 100vh;
  overflow-y: auto;
  /* 스크롤 위한 위아래 여백*/
  padding: 40px 0;
  }

/* 봉투 */
#envelope {
  width: 220px;
  cursor: pointer;
  transition: transform 0.3s;
}
#envelope:hover {
  transform: scale(1.05);
}

/* 편지 */
#letter {
  width: 90%;
  max-width: 400px;
  background: #fffdf8;
  padding: 25px;
  border-radius: 15px;
  margin-top: 20px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.15);

  display: none;
}

/* 텍스트 */
.text {
  white-space: pre-line;
  font-size: 16px;
  line-height: 1.6;
}

/* 사진 */
#photo {
  width: 100%;
  border-radius: 10px;
  margin-top: 15px;
  display: none;
}

/* CTA */
#cta {
  margin-top: 20px;
  text-align: center;
  font-size: 14px;
  color: #888;
}
</style>
</head>

<body>

<img id="envelope" src="envelope.png">

<div id="letter">
  <div class="text" id="text"></div>
  <img id="photo" src="photo.jpg">
  <div id="cta">💌 </div>  <!-- 나도 편지 보내기 -->
</div>

<script>
const message = `To. 100년지기 하고픈 기수수

기수연 우리 10년 우정이다 어림으로 얘기헀었는데 리터럴리 10년이 되었네.

그때의 나는 아직도 취직을 못했을 줄은 꿈에도 몰랐겠지만ㅋㅋㅋ 너라는 친구는 함께 있어서 정말 다행이야.
시간이 참 빠르다,, 해맑게 공부와 노는 거에만 집중하던 그때의 우리들이, 그 시간들이 종종 그리울 때가 있지만 그래도 너랑, 우리 애들이랑 잘 놀고 잘 지낸 것 같아서 감사해.

인연이란 게 계속 유지되는 것도 시간과 상황, 장소, 마음까지 모든 게 잘 맞아떨어져야 한다고 또 느껴. 기수연, 진짜 진짜 네가 나의 친구라서 옛날에도 지금도 큰 응원이 되고 의지가 돼!
그리고 나의 유일한 동네 친구ㅠㅜㅠ 내 친구들 중에 거리상으로 제일 가까운 게 너일 거야ㅋㅋㅋㅋㅋ 이 오지(?)에서도 친구를 만날 수 있다는 게 정말 놀라웠지ㅋㅋㅋ

너의 취준생 기간 때 나는 정신없는 4학년이었어서(나 5학년인가 6학년까지 함.. 알지?ㅋ큐ㅜ) 더 응원해주고 하지 못한 게 조금 아쉬워ㅠㅜ 하지만!! 입사하고 3~5년차가 되면 또 고민이 많아진다고 하더라구!
딱 지금의 너라서 우리 같이 고민하고 얘기하고 나누자고 말하고 싶었어ㅎㅎ 내 고민과 얘기 너도 정말 잘 들어주지만 나도 네 고민과 얘기 더 잘 들어줄 수 있으니 우리 맘껏 얘기하자!!

그리고 너는 누가 봐도 좋은 사람이고 실력 있는 사람인 걸 모두가 알 거야~! 나는 실력을 판단할 수는 없지만ㅋㅎㅋㅎ 내가 이때까지 지켜본 너는 그렇게 공부하면 전문성이 없을 수가 없어ㅋㅋㅋㅋ
암튼 항상 삶을 치열하게 살아가는 네가 더 많이 즐기고 더 많이 웃기를 기도할게💗💗

태어나줘서, 나와 함께 해줘서, 나랑 친구 이렇게 쭉 해줘서 고마워💗💗💗 앞으로의 남은 시간들도 함께 하자~! ㅅㄹㅎ💗💗💗

기수연 생일 정말 정말 진심으로 축하해!! 🎂 (사실 내가 12시 땡하자마자 생일 축하한다고 하려했는데 갑자기 이렇게 보내고 싶은 뽐뿌가 올라와서ㅋ큐ㅜ)

From. 곧 너와 100년지기할 네희`;

let i = 0;
const speed = 40;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, speed);
  } else {
    setTimeout(() => {
      document.getElementById("photo").style.display = "block";
    }, 500);
  }
}

document.getElementById("envelope").onclick = () => {
  document.getElementById("envelope").style.display = "none";

  const letter = document.getElementById("letter");
  letter.style.display = "block";

  setTimeout(typeWriter, 300);
};
</script>

</body>
</html>
