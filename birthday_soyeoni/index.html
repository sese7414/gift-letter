<!DOCTYPE html>
<html lang="ko">
<head>
<meta property="og:type" content="website">
<meta property="og:title" content="💌 선물 같은 편지가 도착했어요">
<meta property="og:description" content="지금 봉투를 열어보세요">
<meta property="og:image" content="https://sese7414.github.io/gift-letter/birthday_soyeoni
/thumbnail.png">
<meta property="og:url" content="https://sese7414.github.io/gift-letter/birthday_soyeoni
/">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>선물 같은 편지</title>

<style>
#intro {
  position: fixed;   /* 핵심 */
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;

  display: flex;
  flex-direction: column;
  justify-content: center;  /* 세로 중앙 */
  align-items: center;      /* 가로 중앙 */

  background: #f7efe5;
  z-index: 10;
}

body {
  margin: 0;
  font-family: 'Pretendard', sans-serif;
  background: #f7efe5;
  display: flex;
  flex-direction: column;
  /*justify-content: center;*/
  /* 이거 있으면 스크롤하다가 잘림. 
  align-items: center; */
  /* ✅ 추가 */
  align-items: stretch;
  padding: 40px 16px; /* 스크롤 위한 위아래 여백*/

  /* 삭제!
  height: 100vh;
  overflow: hidden; */

  /* ✅ 추가 */
  min-height: 100vh;
  overflow-y: auto;

  }

/* 봉투 */
#envelope {
  width: 220px;
  cursor: pointer;
  transition: transform 0.3s;
}
#envelope:hover {
  transform: scale(1.05);
}

/* 편지 */
#letter {
  width: 100%;
  max-width: 400px;
  margin: 80px auto; /* 가운데 정렬 */

  background: #fffdf8;
  padding: 25px;
  border-radius: 15px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.15);

  display: none;
}

/* 텍스트 */
.text {
  white-space: pre-line;
  font-size: 16px;
  line-height: 1.6;
}

/* 사진 */
#photo {
  width: 100%;
  border-radius: 10px;
  margin-top: 15px;
  display: none;
}

/* CTA */
#cta {
  margin-top: 20px;
  text-align: center;
  font-size: 14px;
  color: #888;
}

img {
  object-fit: contain;
}
</style>
</head>

<body>

<div id="intro">
  <img id="envelope" src="envelope.png">
  <p>봉투를 눌러 열어보세요 💌</p>
</div>

<div id="letter">
  <div class="text" id="text"></div>
  <img id="photo" src="photo.jpg">
  <div id="cta">💌 </div>  <!-- 나도 편지 보내기 -->
</div>

<script>
const message = `To. 나만의 웃음 주머니 쏘여니에게
쏘여나! 아니 원래 계속 일정 보면서 알고 있어서 00:00 때 바로 축하보내려고 했는데 날짜 개념이 없었네;; ㅋㅋㅋ큐ㅠㅜㅠ
우리가 벌써 10년이라는 세월을 같이 보냈다니 ! 내 정신연령은 아직 고딩인 것 같은데 언제 이렇게 됐지 오잉ㅋㅎㅋㅎ

너와의 인연을 지금까지 유지할 수 있어서 정말 좋다ㅏㅏ 우리 만날 때마다 조그만 편지랑 선물들 주는 게 항상 감동이었어💜💜💜
나 진짜 그거덕분에 힘 많이 났어! 너무너무 고마워!! 비록 나는 이제 편지 열심히 쓰던 감성이 조금 낮아졌지만,,,
내 편지가 네게도 힘이 됐었길, 그리고 계속 되길 바라며 이렇게 열심히 쓴당ㅋㅎㅋㅎ

나는 비록 당장 9월의 미래도 정확히 모르지만 이 긴 취준시간에 너희가 있어서 정말 다행이라는 생각을 해. 대구에 친구 정말 없는데 너희가 있어서
많이 외롭지 않고 만났을 때 또 왕창 이것저것 얘기하고 털어내고 행복하게 웃을 수 있어서 진짜 감사해 🥹💙💙
아 진짜로 나 너만 있으면 하루종일 웃을 것 같아ㅋㅋㅋㅋ 네가 하는 말 나한테 왜이렇게 다 취향저격이지ㅋㅎㅋㅎ 그래서 우리 만나면 나 맨날 웃고 있잖아 ㅋㅋㅋㅋㅋ

그리고 나도 연락이 잘 되는 편은 아니지만ㅋㅋㅋ 그래도 서로를 믿고 또 만나고 함께 시간을 보내는 것을 즐길 수 있어서 다행이야💕💕
우리 진짜 일단 대전도 가야 하고, 충칭도 가야 하고 갈 데 많으니까 알바하면서 열심히 돈 모을게ㅋㅎㅋㅎ
항상 나를 응원해주고 지지해줘서 너무너무 고마워💙💙 나도 너를 항상 응원하고 있다는 거 잊지마 !! 무슨 일 있으면 바로 연락하구 !!!
이렇게 지금까지 짱친으로 지낼 수 있어서 하나님께 정말 감사해💕💕
오늘 맛있는 거 먹고 재밌게 놀았었길 바라며 다시 한 번 생일 넘넘 축하해 🥳🎉🎉

From. 너의 모든 것에 웃음이 나오는 세희`;

let i = 0;
const speed = 40;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, speed);
  } else {
    setTimeout(() => {
      document.getElementById("photo").style.display = "block";
    }, 500);
  }
}

document.getElementById("envelope").onclick = () => {
  document.getElementById("intro").style.display = "none";

  const letter = document.getElementById("letter");
  letter.style.display = "block";

  setTimeout(typeWriter, 300);
};
</script>

</body>
</html>
